version: '3.9'

services:
  backend:
    image: nazmulhasn/flavora_food_backend:latest
    container_name: flavora_food_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
    expose:
      - '5000'
      - '5005'
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flavora_net

  frontend:
    image: nazmulhasn/flavora_food_frontend:latest
    container_name: flavora_website
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.flavorafood.com
    expose:
      - '3000'
    networks:
      - flavora_net

  nginx:
    image: nginx:1.25-alpine
    container_name: flavora_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - flavora_net

  certbot:
    image: certbot/certbot:latest
    container_name: flavora_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"

  mongo:
    image: mongo:7.0
    container_name: flavora_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: flavora_food
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    expose:
      - '27017'
    networks:
      - flavora_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7.2-alpine
    container_name: flavora_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - '6379'
    networks:
      - flavora_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  mongo_config:
  redis_data:

networks:
  flavora_net:
    driver: bridge