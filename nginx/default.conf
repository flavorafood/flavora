server {
    listen 80;
    listen [::]:80;

    server_name
        flavorafood.com
        www.flavorafood.com
        api.flavorafood.com
        www.api.flavorafood.com
        admin.flavorafood.com
        www.admin.flavorafood.com
        truck.flavorafood.com
        www.truck.flavorafood.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Main site
    location / {
        return 200 "Flavora Food - Coming Soon";
        add_header Content-Type text/plain;
    }
}